name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: platform_user
          POSTGRES_PASSWORD: CHANGE_ME
          POSTGRES_DB: customer_intelligence
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pytest pytest-asyncio pytest-cov
        pip install -r backend/requirements.txt || true
        
    - name: Lint with ruff
      run: |
        ruff check .
        
    - name: Type check with mypy
      run: |
        mypy backend mlops decision_engine || true
        
    - name: Run tests with pytest
      env:
        DATABASE_HOST: localhost
        DATABASE_PASSWORD: CHANGE_ME
      run: |
        pytest tests/ -v --cov=mlops --cov-report=term-missing
        
  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker Image (No Push)
      run: |
        docker build -t customer-intelligence:latest .
